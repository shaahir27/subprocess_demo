<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthDesk</title>

    <link href="https://fonts.googleapis.com/css2?family=Satisfy&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=MonteCarlo&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body {
            background-color: #f4f6f8;
            font-family: 'Poppins', sans-serif;
        }

        .navbar {
            background-color: #2E86C1 !important;
        }

        .navbar-brand {
            color: white;
            letter-spacing: 1px;
            font-family: 'Satisfy';
            font-size: 28px;
        }

        .nav-link {
            color: white !important;
            margin-right: 10px;
        }

        .nav-link:hover {
            text-decoration: underline;
        }

        .container-card {
            margin-top: 40px;
        }

        .card {
            border-radius: 15px;
        }

        .btn-primary {
            background-color: #2E86C1;
            border: none;
        }

        .btn-primary:hover {
            background-color: #1f618d;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark shadow">
        <div class="container">
            <a class="navbar-brand" href="/">HealthDesk</a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="/">Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/">Patients</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/doctors">Doctors</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/queue">Queue</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/diagnosis">Diagnosis</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/billing">Billing</a>
                    </li>

                </ul>
            </div>
        </div>
    </nav>

    <!-- MAIN CONTENT -->
    <div class="container container-card">
        {% block content %}
        
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
