<!-- Used HTML Extensions for reusability of code -->

{% extends "index.html" %}  

{% block content %}

    <div class="card shadow p-5 mx-auto text-center" style="max-width: 600px;">
        
        <h2 class="text-success mb-3">
            ✅ Patient Registered Successfully
        </h2>

        <div class="mb-4 text-start mx-auto" style="max-width: 300px;">

        <div class="d-flex justify-content-between">
            <span><strong>Patient ID:</strong></span>
            <!-- Jinja Template -->
            <span class="text-primary">{{ patient_id }}</span> 
        </div>

        <div class="d-flex justify-content-between">
            <span><strong>Visit Type:</strong></span>
            <!-- Jinja Template -->
            <span class="text-warning">{{ visit_type }}</span>
        </div>

        <div class="d-flex justify-content-between">
            <span><strong>Priority:</strong></span>
            <!-- Jinja Template -->
            <span class="text-secondary">{{ priority }}</span>
        </div>

    </div>

    <p class="text-muted mb-4">
        The patient has been added to the system and is ready for queue assignment.
    </p>

    <div class="d-flex justify-content-center gap-3">
        <a href="/" class="btn btn-primary">
            ➕ Add Another Patient
        </a>

        <a href="/" class="btn btn-outline-secondary">
            🏠 Go to Dashboard
        </a>
    </div>

</div>

{% endblock %}
